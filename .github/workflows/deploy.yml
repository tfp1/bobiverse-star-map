name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Opt JS-based actions (checkout, setup-node, configure-pages,
# upload-pages-artifact, deploy-pages) into Node 24. Node 20 is
# deprecated for action runtimes and will be removed from the
# runner 2026-09-16; this clears the deprecation warning and
# avoids the eventual hard-fail.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build site
        env:
          BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
